# review-gate — режим SubagentStop-гейта качества (см. .claude/hooks/review-gate.sh)
#
# REVIEW_GATE_MODE:
#   off    — выключено
#   warn   — advisory при провале, не блокирует (по умолчанию)
#   strict — блокирует завершение субагента до починки (exit 2)
#
# REVIEW_GATE_CMD — команда проверки (быстрая, детерминированная).
#   В azguard phpstan НЕ установлен → дефолт только Pint.
#   Для строгого гейта можно добавить тесты, но они тяжёлые на каждый SubagentStop.

REVIEW_GATE_MODE=warn
REVIEW_GATE_CMD=composer analyse
