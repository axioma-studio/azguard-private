# Per-project режим auto-approve хука (~/.claude/hooks/auto-approve/auto-approve.sh).
# Переопределяет дефолт из ~/.claude/hooks/auto-approve/env.ini для этого проекта.
# После смены — ПЕРЕЗАПУСТИ Claude Code (режим читается при старте сессии).
#
#   bypass — авто-подтверждение диалога плана (ExitPlanMode) + одобрение любых
#            команд, кроме катастрофичных (deny_hard: sudo / rm -rf / mkfs / fork-bomb / | sh ...).
#            Для полного отключения промптов можно дополнительно добавить в
#            settings.local.json: "permissions": { "defaultMode": "bypassPermissions" }.
MODE=bypass
