# Source: anonymized production Laravel project
# Локальные переопределения Docker Compose (не коммитятся).
#
# Скопируйте в корень репозитория:
#   cp docker-compose.override.example.yml docker-compose.override.yml
#
# Когда нужен:
# - WSL2 / Linux с bind-mount: vite должен писать в ./ от uid хоста,
#   иначе Permission denied на node_modules и генерируемые файлы.
# - На «чистом» Linux без override vite работает как www-data — файл не обязателен.
#
# PUID/PGID в .env.docker должны совпадать с id -u / id -g на хосте.

services:
  vite:
    user: "1000:1000"
    command:
      [
        "sh",
        "-lc",
        "pnpm run dev",
      ]
