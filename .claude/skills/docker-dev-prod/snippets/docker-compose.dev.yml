# Source: anonymized production Laravel project
# Dev-compose (корневой docker-compose.yml): build из контекста + bind-mount исходников.
# .env читается из смонтированного файла — НЕ через build args (значение «замерзает» при create).
services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: app_app
    restart: unless-stopped
    stop_signal: SIGTERM
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/zzz-upload.ini
    ports:
      - "${APP_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Якорь &app_env: общий блок окружения, переиспользуется другими сервисами через *app_env
    environment: &app_env
      PUID: ${PUID:-0}
      PGID: ${PGID:-0}
      APP_NAME: ${APP_NAME}
      APP_ENV: ${APP_ENV}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG}
      # APP_URL только из смонтированного .env: иначе значение «застывает» при create контейнера.
      DB_CONNECTION: pgsql
      DB_HOST: pgsql
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      CACHE_STORE: ${CACHE_STORE:-file}
      SESSION_DRIVER: ${SESSION_DRIVER:-file}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
    depends_on:
      pgsql: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/up >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - app_network

  vite:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: app_vite
    restart: unless-stopped
    working_dir: /var/www/html
    command: ["sh", "-lc", "pnpm install && pnpm run dev --host=0.0.0.0 --port=${VITE_PORT:-5173}"]
    volumes:
      - ./:/var/www/html
      # node_modules — named volume, НЕ bind-mount (скорость + изоляция от хоста)
      - vite_node_modules:/var/www/html/node_modules
    ports:
      - "${VITE_PORT:-5173}:${VITE_PORT:-5173}"
    environment: *app_env
    depends_on:
      app: { condition: service_healthy }
    networks:
      - app_network

  pgsql:
    image: postgres:16-alpine
    container_name: app_pgsql
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PGSQL_PORT:-5432}:5432"
    volumes:
      - pgsql_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: app_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  pgsql_data:
  redis_data:
  vite_node_modules:
