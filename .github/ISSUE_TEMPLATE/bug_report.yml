name: Bug report
description: Report a problem with AzGuard
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug. Please fill in the details below.
  - type: input
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      placeholder: azguard-core / azguard-filament / azguard-context
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: AzGuard, Laravel and PHP versions.
      placeholder: "azguard 0.x, Laravel 12, PHP 8.3"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal code sample is ideal.
    validations:
      required: true
