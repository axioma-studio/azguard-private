name: Code Style

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  pint:
    name: Laravel Pint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Get changed PHP files
        id: changed
        run: |
          BASE=${{ github.event.pull_request.base.sha || 'HEAD~1' }}
          FILES=$(git diff --name-only --diff-filter=ACMR "$BASE" HEAD -- '*.php' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Run Pint on changed files
        if: steps.changed.outputs.files != ''
        run: vendor/bin/pint --test ${{ steps.changed.outputs.files }}

      - name: No PHP files changed
        if: steps.changed.outputs.files == ''
        run: echo "No PHP files changed, skipping Pint."
