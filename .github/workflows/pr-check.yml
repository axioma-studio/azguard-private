name: PR Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, edited, reopened]

jobs:
  title:
    name: Conventional Commit title
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            ci
            chore
            revert
          requireScope: false

  size:
    name: PR size check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check PR size
        uses: CodelyTV/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size/XS'
          xs_max_size: 50
          s_label: 'size/S'
          s_max_size: 200
          m_label: 'size/M'
          m_max_size: 500
          l_label: 'size/L'
          l_max_size: 1000
          xl_label: 'size/XL'
          fail_if_xl: false
