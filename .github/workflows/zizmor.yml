name: Zizmor

on:
  push:
    branches: [main]
    paths: ['.github/workflows/**']
  pull_request:
    branches: [main]
    paths: ['.github/workflows/**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zizmor:
    name: Audit GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install zizmor
        run: pipx install zizmor

      - name: Audit workflows
        run: zizmor --persona regular .github/workflows/ || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
