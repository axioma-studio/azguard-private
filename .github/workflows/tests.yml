name: Tests

on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'hotfix/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
        laravel: ['11.*', '12.*']
        include:
          - php: '8.3'
            laravel: '11.*'
            testbench: '^9.0'
          - php: '8.3'
            laravel: '12.*'
            testbench: '^10.0'
          - php: '8.4'
            laravel: '11.*'
            testbench: '^9.0'
          - php: '8.4'
            laravel: '12.*'
            testbench: '^10.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_sqlite, sqlite3
          coverage: xdebug
          tools: composer:v2
        env:
          XDEBUG_MODE: coverage

      - name: Validate composer
        run: composer validate --strict

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-
            ${{ runner.os }}-php${{ matrix.php }}-

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --dev --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/pest --ci --coverage --min=80 --coverage-clover=coverage.xml
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          XDEBUG_MODE: coverage

      - name: Upload coverage to Codecov
        if: matrix.php == '8.3' && matrix.laravel == '12.*' && secrets.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
