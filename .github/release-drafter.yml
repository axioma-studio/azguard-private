name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

version-resolver:
  major:
    labels: ['breaking change', 'major']
  minor:
    labels: ['feature', 'enhancement', 'minor']
  patch:
    labels: ['fix', 'bugfix', 'bug', 'patch', 'chore', 'maintenance']
  default: patch

categories:
  - title: '🚀 Features'
    labels: ['feature', 'enhancement']
  - title: '🐛 Bug Fixes'
    labels: ['fix', 'bugfix', 'bug']
  - title: '💥 Breaking Changes'
    labels: ['breaking change']
  - title: '🧰 Maintenance'
    labels: ['chore', 'maintenance']
  - title: '📚 Documentation'
    labels: ['documentation', 'docs']

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: $PREVIOUS_TAG...$RESOLVED_VERSION
