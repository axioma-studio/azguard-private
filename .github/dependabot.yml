version: 2

updates:
  # Composer (PHP) dependencies
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Europe/Helsinki
    open-pull-requests-limit: 5
    groups:
      laravel-ecosystem:
        patterns:
          - 'laravel/*'
          - 'illuminate/*'
          - 'orchestra/*'
      dev-tools:
        patterns:
          - 'pestphp/*'
          - 'phpstan/*'
          - 'larastan/*'
          - 'laravel/pint'
          - 'rector/rector'
          - 'infection/infection'
    ignore:
      - dependency-name: 'laravel/framework'
        update-types: ['version-update:semver-major']

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Europe/Helsinki
    open-pull-requests-limit: 5
